<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Anatomia strony WWW</title>

  <style>
  /* ============================================================
     edulab — Colors & Type foundation (verbatim from design tokens)
     ============================================================ */
  @import url('https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,500;12..96,600;12..96,700;12..96,800&family=Hanken+Grotesk:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap');

  :root {
    /* ---- Brand fonts ---- */
    --font-display: 'Bricolage Grotesque', 'Hanken Grotesk', system-ui, sans-serif;
    --font-sans:    'Hanken Grotesk', system-ui, -apple-system, sans-serif;
    --font-mono:    'DM Mono', ui-monospace, 'SF Mono', Menlo, monospace;

    /* Paper — warm cream backgrounds (the brand never sits on pure white) */
    --paper:    #FBF7F0;
    --paper-2:  #F4EDDF;
    --paper-3:  #ECE1CF;
    --surface:  #FFFFFF;

    /* Ink — warm near-black text & lines */
    --ink:      #211E1A;
    --ink-2:    #5B554D;
    --ink-3:    #938A7C;
    --line:     #E7DCCB;
    --line-2:   #D6C8B2;

    /* Marigold — primary brand */
    --marigold:      #E8920C;
    --marigold-600:  #CE800A;
    --marigold-soft: #FBE7C2;
    --marigold-ink:  #8A4F00;

    /* Teal — secondary brand */
    --teal:      #0E8C7F;
    --teal-600:  #0B7468;
    --teal-soft: #D2EBE6;
    --teal-ink:  #0A5A52;

    /* Coral — accent (use sparingly) */
    --coral:      #EF5B3F;
    --coral-600:  #D44A30;
    --coral-soft: #FBDDD4;
    --coral-ink:  #9A2E1B;

    /* Sky — supportive */
    --sky:      #2E78C9;
    --sky-soft: #D9E7F6;
    --sky-ink:  #1B4E88;

    /* Play palette */
    --play-sun:    #F2A516;
    --play-grass:  #4FA45C;
    --play-berry:  #C6478B;
    --play-grape:  #7A5AC2;
    --play-sky:    #2E78C9;
    --play-coral:  #EF5B3F;

    /* ---- Semantic ---- */
    --success: #2F8F5B;  --success-soft: #D7EEDD;  --success-ink: #1C6A3E;
    --warning: #C9810A;  --warning-soft: #FBEAC6;  --warning-ink: #855207;
    --danger:  #D8412A;  --danger-soft:  #FAD9D2;  --danger-ink:  #97271A;
    --info:    #2E78C9;  --info-soft:    #D9E7F6;  --info-ink:    #1B4E88;

    /* ---- Functional aliases ---- */
    --bg:        var(--paper);
    --fg:        var(--ink);
    --fg-muted:  var(--ink-2);
    --primary:   var(--marigold);
    --on-primary:#FFFFFF;
    --focus-ring: 0 0 0 3px rgba(232,146,12,.38);

    /* ---- Spacing (4pt base) ---- */
    --sp-1: 4px;  --sp-2: 8px;  --sp-3: 12px; --sp-4: 16px;
    --sp-5: 20px; --sp-6: 24px; --sp-8: 32px; --sp-10: 40px;
    --sp-12: 48px; --sp-16: 64px; --sp-20: 80px; --sp-24: 96px;

    /* ---- Radii ---- */
    --r-xs: 6px; --r-sm: 10px; --r-md: 14px; --r-lg: 20px; --r-xl: 28px; --r-pill: 999px;

    /* ---- Elevation ---- */
    --shadow-sm: 0 1px 2px rgba(33,30,26,.06), 0 1px 1px rgba(33,30,26,.04);
    --shadow-md: 0 4px 16px rgba(33,30,26,.08), 0 1px 3px rgba(33,30,26,.05);
    --shadow-lg: 0 16px 40px rgba(33,30,26,.12), 0 3px 8px rgba(33,30,26,.06);
    --shadow-marigold: 0 8px 22px rgba(232,146,12,.28);

    /* ---- Type scale ---- */
    --display-font:  clamp(48px, 6vw, 72px);
    --h1: 44px; --h2: 33px; --h3: 25px; --h4: 19px;
    --body-lg: 18px; --body: 16px; --body-sm: 14px;
    --caption: 13px; --overline: 12px;
  }

  /* ---- semantic element helpers used here ---- */
  .edu-overline {
    font-family: var(--font-mono); font-weight: 500; font-size: var(--overline);
    letter-spacing: .14em; text-transform: uppercase; color: var(--marigold-ink);
  }
  .edu-mono { font-family: var(--font-mono); }

  /* ============================================================
     App styles — all colours via var(--…) tokens, no raw hex
     ============================================================ */
  * { box-sizing: border-box; }
  body.edu {
    margin: 0; background: var(--paper); color: var(--ink);
    font-family: var(--font-sans); line-height: 1.6;
  }
  .shell { max-width: 1100px; margin: 0 auto; padding: 0 var(--sp-8); }

  /* Branded top menu */
  .edu-header {
    position: sticky; top: 0; z-index: 50; width: 100%;
    background: rgba(251, 247, 240, 0.85);
    backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--line);
  }
  .edu-header-inner {
    max-width: 1100px; margin: 0 auto;
    padding: 15px var(--sp-8); display: flex; align-items: center; gap: 12px;
  }
  .edu-logo { width: 32px; height: 32px; display: block; }
  .edu-wordmark { font-family: var(--font-display); font-weight: 700; font-size: 22px; letter-spacing: -.02em; color: var(--ink); }
  .edu-tag {
    font-family: var(--font-mono); font-weight: 500; font-size: 11px;
    letter-spacing: .14em; text-transform: uppercase; color: var(--teal-ink);
    background: var(--teal-soft); padding: 4px 9px; border-radius: var(--r-pill);
  }

  /* Page header scheme */
  .page-header { text-align: center; padding: var(--sp-12) 0 var(--sp-6); }
  .page-header .edu-overline { display: block; margin-bottom: var(--sp-3); }
  .app-title {
    font-family: var(--font-display); font-weight: 800;
    font-size: clamp(2rem, 4.5vw, 2.85rem); letter-spacing: -.025em;
    line-height: 1.05; color: var(--ink); margin: 0 0 var(--sp-4);
  }
  .edu-lead { font-size: 1.0625rem; color: var(--ink-2); max-width: 36rem; margin: 0 auto; }

  /* Controls */
  .controls {
    display: flex; gap: var(--sp-3); flex-wrap: wrap; align-items: center;
    background: var(--surface); border: 1px solid var(--line);
    border-radius: var(--r-lg); padding: var(--sp-4) var(--sp-5);
    box-shadow: var(--shadow-sm); margin-bottom: var(--sp-6);
  }
  .controls input[type="text"] {
    flex: 1 1 320px; min-width: 0;
    font-family: var(--font-sans); font-size: var(--body);
    color: var(--ink); background: var(--paper);
    border: 1px solid var(--line-2); border-radius: var(--r-pill);
    padding: 12px 18px;
  }
  .controls input[type="text"]::placeholder { color: var(--ink-3); }
  .controls input[type="text"]:focus-visible { outline: none; box-shadow: var(--focus-ring); border-color: var(--marigold); }

  .edu-btn {
    font-family: var(--font-display); font-weight: 600; font-size: var(--body);
    background: var(--marigold); color: var(--on-primary);
    border: none; border-radius: var(--r-pill); padding: 12px 22px; cursor: pointer;
    box-shadow: var(--shadow-marigold);
    transition: background .12s ease, transform .12s cubic-bezier(.32,.72,.32,1);
  }
  .edu-btn:hover { background: var(--marigold-600); }
  .edu-btn:active { transform: scale(.96); }
  .edu-btn:focus-visible { outline: none; box-shadow: var(--focus-ring); }

  .edu-btn-ghost {
    font-family: var(--font-display); font-weight: 600; font-size: var(--body);
    background: var(--teal-soft); color: var(--teal-ink);
    border: none; border-radius: var(--r-pill); padding: 12px 20px; cursor: pointer;
    transition: background .12s ease, transform .12s cubic-bezier(.32,.72,.32,1);
  }
  .edu-btn-ghost:hover { background: var(--teal-600); color: var(--on-primary); }
  .edu-btn-ghost:active { transform: scale(.96); }
  .edu-btn-ghost:focus-visible { outline: none; box-shadow: var(--focus-ring); }

  /* Optional API key disclosure */
  .apikey {
    margin-bottom: var(--sp-6); border: 1px solid var(--line);
    border-radius: var(--r-md); background: var(--surface); padding: 2px 16px;
    box-shadow: var(--shadow-sm);
  }
  .apikey summary {
    cursor: pointer; list-style: revert;
    font-family: var(--font-mono); font-size: var(--body-sm);
    letter-spacing: .02em; color: var(--ink-2); padding: 10px 0;
  }
  .apikey summary:focus-visible { outline: none; box-shadow: var(--focus-ring); border-radius: var(--r-xs); }
  .apikey-hint { font-size: var(--body-sm); color: var(--ink-2); line-height: 1.55; margin: 2px 0 12px; }
  .apikey-row { display: flex; gap: var(--sp-3); flex-wrap: wrap; align-items: center; margin-bottom: 8px; }
  .apikey-row input {
    flex: 1 1 240px; min-width: 0;
    font-family: var(--font-mono); font-size: var(--body-sm); color: var(--ink);
    background: var(--paper); border: 1px solid var(--line-2);
    border-radius: var(--r-pill); padding: 9px 16px;
  }
  .apikey-row input:focus-visible { outline: none; box-shadow: var(--focus-ring); border-color: var(--marigold); }
  .apikey-clear {
    font-family: var(--font-sans); font-size: var(--body-sm); background: none;
    border: none; color: var(--ink-3); cursor: pointer; text-decoration: underline; padding: 6px;
  }
  .apikey-clear:hover { color: var(--danger-ink); }
  .apikey-clear:focus-visible { outline: none; box-shadow: var(--focus-ring); border-radius: var(--r-xs); }
  .apikey-status { font-size: var(--body-sm); color: var(--success-ink); min-height: 1.1em; margin: 0 0 10px; }

  /* Decoupling note between panels */
  .note {
    font-size: var(--body-sm); color: var(--ink-2); line-height: 1.5;
    display: flex; gap: var(--sp-2); align-items: flex-start;
  }
  .note .ic { color: var(--marigold-ink); flex: none; font-weight: 700; }
  .note-decoupled {
    background: var(--marigold-soft); color: var(--marigold-ink);
    border-radius: var(--r-md); padding: 12px 16px; margin-bottom: var(--sp-6);
    font-size: var(--body-sm); text-align: center; line-height: 1.5;
  }

  /* Stacked panels — Waga on top, preview below (full width) */
  .panels { display: grid; grid-template-columns: 1fr; gap: var(--sp-6); align-items: start; }
  .panel {
    background: var(--surface); border: 1px solid var(--line);
    border-radius: var(--r-xl); padding: var(--sp-6) var(--sp-6) var(--sp-5);
    box-shadow: var(--shadow-md);
  }
  .panel-title { font-family: var(--font-display); font-weight: 700; font-size: var(--h3); color: var(--ink); margin: 0 0 var(--sp-2); }
  .panel-sub { font-size: var(--body-sm); color: var(--ink-3); margin: 0 0 var(--sp-5); }

  /* Stat blocks */
  .stats { display: grid; grid-template-columns: 1fr 1fr; gap: var(--sp-4); margin-bottom: var(--sp-5); }
  .stat { border-radius: var(--r-lg); padding: 20px 22px; }
  .stat.req { background: var(--marigold-soft); }
  .stat.size { background: var(--teal-soft); }
  .stat .val { font-family: var(--font-display); font-weight: 700; font-size: 38px; line-height: 1; }
  .stat.req .val { color: var(--marigold-ink); }
  .stat.size .val { color: var(--teal-ink); }
  .stat .lbl { font-size: var(--body-sm); color: var(--ink-2); margin-top: 6px; }

  /* Bar chart */
  .breakdown-title { font-family: var(--font-display); font-weight: 600; font-size: var(--h4); color: var(--ink); margin: 0 0 var(--sp-3); }
  .bars { display: flex; flex-direction: column; gap: 10px; margin-bottom: var(--sp-4); }
  .bar-row { display: grid; grid-template-columns: 120px 1fr auto; align-items: center; gap: 10px; }
  .bar-row .name { font-size: var(--body-sm); color: var(--ink-2); }
  .bar-track { display: block; background: var(--paper-3); border-radius: var(--r-pill); height: 16px; overflow: hidden; }
  .bar-fill { display: block; height: 100%; border-radius: var(--r-pill); min-width: 3px; }
  .bar-row .amt { font-family: var(--font-mono); font-size: var(--caption); color: var(--ink-2); white-space: nowrap; }

  .biggest { background: var(--paper-2); border-radius: var(--r-md); padding: 12px 16px; margin-bottom: var(--sp-4); font-size: var(--body-sm); color: var(--ink-2); }
  .biggest strong { color: var(--ink); }

  /* a11y data table */
  .data-table { width: 100%; border-collapse: collapse; font-size: var(--body-sm); margin-bottom: var(--sp-4); }
  .data-table caption { text-align: left; font-size: var(--caption); color: var(--ink-3); margin-bottom: 6px; }
  .data-table th, .data-table td { text-align: left; padding: 6px 8px; border-bottom: 1px solid var(--line); }
  .data-table td.num { text-align: right; font-family: var(--font-mono); }
  .visually-hidden { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0 0 0 0); white-space: nowrap; border: 0; }

  /* States */
  .state { color: var(--ink-2); font-size: var(--body-sm); padding: var(--sp-6) 0; text-align: center; }
  .state.err { color: var(--danger-ink); background: var(--danger-soft); border-radius: var(--r-md); padding: 14px 16px; }
  .spinner {
    width: 22px; height: 22px; border-radius: 50%;
    border: 3px solid var(--paper-3); border-top-color: var(--marigold);
    animation: spin 0.8s linear infinite; margin: 0 auto var(--sp-3);
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Toggles (appearance) */
  .layers-hint { font-size: var(--body-sm); color: var(--ink-2); margin: 0 0 var(--sp-3); }
  .toggles {
    background: var(--teal-soft); border-radius: var(--r-lg);
    padding: 16px 18px; margin-bottom: var(--sp-5);
    display: grid; grid-template-columns: 1fr 1fr; gap: 10px 18px;
  }
  .toggle { display: flex; align-items: center; gap: 10px; font-size: var(--body-sm); color: var(--teal-ink); cursor: pointer; }
  .toggle input { width: 18px; height: 18px; accent-color: var(--teal); cursor: pointer; }
  .toggle input:focus-visible { outline: none; box-shadow: var(--focus-ring); border-radius: 4px; }

  .preview-frame {
    width: 100%; height: clamp(480px, 78vh, 900px); border: 1px solid var(--line-2);
    border-radius: var(--r-md); background: var(--surface);
  }
  .spa-warning {
    background: var(--warning-soft); color: var(--warning-ink);
    border-radius: var(--r-md); padding: 12px 16px; margin-top: var(--sp-4);
    font-size: var(--body-sm); line-height: 1.5;
  }
  .panel-note { margin-top: var(--sp-4); }

  /* Mode switch — real-site analysis vs. example */
  .mode-switch {
    display: flex; gap: 4px; width: fit-content; margin: 0 auto var(--sp-6);
    background: var(--paper-2); border: 1px solid var(--line);
    border-radius: var(--r-pill); padding: 4px;
  }
  .mode-btn {
    font-family: var(--font-display); font-weight: 600; font-size: var(--body-sm);
    cursor: pointer; background: none; border: none; color: var(--ink-2);
    padding: 9px 18px; border-radius: var(--r-pill);
    transition: background .12s ease, color .12s ease;
  }
  .mode-btn:hover { color: var(--ink); }
  .mode-btn[aria-selected="true"] { background: var(--marigold); color: var(--on-primary); }
  .mode-btn:focus-visible { outline: none; box-shadow: var(--focus-ring); }

  .files-sizes {
    font-family: var(--font-mono); font-size: var(--caption); color: var(--ink-2);
    background: var(--paper-2); border-radius: var(--r-sm);
    padding: 8px 12px; margin: 0 0 var(--sp-3);
  }

  /* Lesson — "Jak zbudowana jest strona?" */
  .lesson { margin-top: var(--sp-6); }
  .stages { display: flex; flex-wrap: wrap; gap: var(--sp-3); margin: var(--sp-5) 0; }
  .stage-btn {
    font-family: var(--font-mono); font-size: var(--body-sm); cursor: pointer;
    background: var(--paper-2); color: var(--ink-2);
    border: 1px solid var(--line); border-radius: var(--r-pill); padding: 9px 16px;
    transition: background .12s ease, color .12s ease;
  }
  .stage-btn:hover { background: var(--paper-3); }
  .stage-btn[aria-selected="true"] { background: var(--marigold); color: var(--on-primary); border-color: var(--marigold); }
  .stage-btn:focus-visible { outline: none; box-shadow: var(--focus-ring); }

  .lesson-grid { display: block; }
  .lesson-frame {
    width: 100%; height: 460px; border: 1px solid var(--line-2);
    border-radius: var(--r-md); background: var(--surface);
  }
  .lesson-explain {
    background: var(--teal-soft); border-radius: var(--r-lg);
    padding: 18px 22px; color: var(--teal-ink); margin-bottom: var(--sp-5);
  }
  .lesson-explain h3 { font-family: var(--font-display); font-size: var(--h4); margin: 0 0 var(--sp-2); color: var(--teal-ink); }
  .lesson-explain p { margin: 0 0 var(--sp-3); font-size: var(--body-sm); line-height: 1.55; color: var(--teal-ink); }
  /* explanation above the preview: flow bullets horizontally to save vertical space */
  .lesson-explain ul { display: flex; flex-wrap: wrap; gap: 4px 22px; list-style-position: inside; margin: 0; padding-left: 18px; font-size: var(--body-sm); line-height: 1.6; color: var(--teal-ink); }
  .lesson-explain li { margin-bottom: 4px; }

  /* File viewer */
  .files { margin-top: var(--sp-6); border-top: 1px solid var(--line); padding-top: var(--sp-5); }
  .files h3 { font-family: var(--font-display); font-size: var(--h4); margin: 0 0 var(--sp-2); color: var(--ink); }
  .file-tabs { display: flex; flex-wrap: wrap; gap: var(--sp-2); margin: var(--sp-3) 0; }
  .file-tab {
    font-family: var(--font-mono); font-size: var(--body-sm); cursor: pointer;
    background: none; border: none; color: var(--ink-3);
    padding: 6px 4px; border-bottom: 2px solid transparent;
  }
  .file-tab:hover { color: var(--ink-2); }
  .file-tab[aria-selected="true"] { color: var(--ink); border-bottom-color: var(--teal); }
  .file-tab:focus-visible { outline: none; box-shadow: var(--focus-ring); border-radius: var(--r-xs); }
  .file-role { font-size: var(--body-sm); color: var(--ink-2); margin: 0 0 var(--sp-3); }
  .file-code {
    background: var(--ink); border-radius: var(--r-lg); padding: 18px 20px; margin: 0;
    max-height: 380px; overflow: auto;
  }
  .file-code code {
    font-family: var(--font-mono); font-size: var(--caption); line-height: 1.6;
    color: var(--paper); white-space: pre; background: none; padding: 0;
  }

  /* Responsive */
  @media (max-width: 860px) {
    .shell { padding: 0 var(--sp-5); }
    .bar-row { grid-template-columns: 96px 1fr auto; }
  }
  @media (max-width: 520px) {
    .toggles { grid-template-columns: 1fr; }
    .controls input[type="text"] { flex-basis: 100%; }
    .bar-row { grid-template-columns: 84px 1fr; }
    .bar-row .amt { grid-column: 2; text-align: right; }
  }
  </style>
</head>

<body class="edu">
  <!-- Branded top menu -->

  <main class="shell">
    <!-- Page header scheme -->
    <div class="page-header">
      <span class="edu-overline">Interaktywne demo</span>
      <h1 class="app-title" id="appName">Anatomia strony WWW</h1>
      <p class="edu-lead" id="tagline"></p>
    </div>

    <!-- Mode switch: show EITHER the real-site analyzer OR the Rogalik example -->
    <div class="mode-switch" id="modeSwitch" role="tablist" aria-label="Tryb">
      <button type="button" class="mode-btn" id="modeRealBtn" data-mode="real" role="tab"></button>
      <button type="button" class="mode-btn" id="modeExampleBtn" data-mode="example" role="tab"></button>
    </div>

    <!-- ===== Tryb: analiza prawdziwej strony ===== -->
    <div id="realMode">
    <!-- Controls -->
    <form class="controls" id="form" autocomplete="off">
      <input type="text" id="url" inputmode="url" autocapitalize="off" spellcheck="false" />
      <button type="submit" class="edu-btn" id="analyzeBtn"></button>
      <button type="button" class="edu-btn-ghost" id="sampleBtn"></button>
    </form>

    <!-- Optional PageSpeed API key — stored only in this browser's localStorage -->
    <details class="apikey" id="apiKeyBox">
      <summary id="apiKeyTitle"></summary>
      <p class="apikey-hint" id="apiKeyHint"></p>
      <div class="apikey-row">
        <input type="password" id="apiKey" autocomplete="off" spellcheck="false" />
        <button type="button" class="edu-btn-ghost" id="apiKeySaveBtn"></button>
        <button type="button" class="apikey-clear" id="apiKeyClearBtn"></button>
      </div>
      <p class="apikey-status" id="apiKeyStatus" aria-live="polite"></p>
    </details>

    <!-- Decoupling note -->
    <p class="note-decoupled" id="noteDecoupled"></p>

    <!-- Panels -->
    <div class="panels">
      <!-- Panel A — Waga -->
      <section class="panel" id="panelA" aria-labelledby="panelATitle">
        <h2 class="panel-title" id="panelATitle"></h2>
        <p class="panel-sub" id="panelASub"></p>
        <div id="weightBody" aria-live="polite"></div>
        <p class="note panel-note"><span class="ic" aria-hidden="true">ⓘ</span><span id="noteWeight"></span></p>
      </section>

      <!-- Panel B — Wygląd -->
      <section class="panel" id="panelB" aria-labelledby="panelBTitle">
        <h2 class="panel-title" id="panelBTitle"></h2>
        <p class="layers-hint" id="layersHint"></p>
        <div class="toggles" id="toggles">
          <label class="toggle"><input type="checkbox" id="tCss" checked> <span id="lblCss"></span></label>
          <label class="toggle"><input type="checkbox" id="tJs" checked> <span id="lblJs"></span></label>
          <label class="toggle"><input type="checkbox" id="tImg" checked> <span id="lblImg"></span></label>

    $("apiKeySaveBtn").addEventListener("click", function () {

  /* ---- Helpers ---- */
  function kb(bytes) { return Math.round(bytes / 1024).toLocaleString("pl-PL") + " KB"; }
  function intl(n) { return Number(n).toLocaleString("pl-PL"); }
  function labelFor(resType) { return PL.types[TYPE_KEY[resType] || "other"] || PL.types.other; }

  /* ============================================================
     Panel A — Page weight (PSI) per spec §3
     ============================================================ */
  // ---- Optional PageSpeed API key (stored only in this browser) ----
  const PSI_KEY_LS = "anatomia.psiKey";
  function getApiKey() { try { return localStorage.getItem(PSI_KEY_LS) || ""; } catch (e) { return ""; } }

  async function getWeight(targetUrl) {
    const api = "https://www.googleapis.com/pagespeedonline/v5/runPagespeed";
    const key = getApiKey();
    let url = api + "?url=" + encodeURIComponent(targetUrl) + "&strategy=mobile&locale=pl";
    if (key) url += "&key=" + encodeURIComponent(key);
    const res = await fetch(url);
    if (!res.ok) {
      if (res.status === 429) throw new Error("PSI_QUOTA");
      if (res.status === 400 || res.status === 403) throw new Error("PSI_AUTH");
      throw new Error("PSI_FAILED");
    }
    const json = await res.json();
    const audit = json.lighthouseResult &&
      json.lighthouseResult.audits &&
      json.lighthouseResult.audits["resource-summary"];
    if (!audit || !audit.details) throw new Error("PSI_FAILED");
    // Lighthouse names the byte field `transferSize`; older/sample data use `size`.
    const bytesOf = i => (i.transferSize != null ? i.transferSize : (i.size != null ? i.size : 0));
    const items = audit.details.items;
    const total = items.find(i => i.resourceType === "total");
    const byType = items
      .filter(i => i.resourceType !== "total" && i.requestCount > 0)
      .map(i => ({ resourceType: i.resourceType, requestCount: i.requestCount, size: bytesOf(i) }))
      .sort((a, b) => b.size - a.size);
    return { requests: total.requestCount, bytes: bytesOf(total), byType };
  }

  function renderWeight(data) {
    const maxSize = Math.max.apply(null, data.byType.map(i => i.size)) || 1;
    const top = data.byType.slice(0, 2).map(i => labelFor(i.resourceType)).join(", ");

    let bars = "";
    let rows = "";
    data.byType.forEach(i => {
      const name = labelFor(i.resourceType);
      const color = TYPE_COLOR[i.resourceType] || TYPE_COLOR.other;
      const pct = Math.max(2, Math.round((i.size / maxSize) * 100));
      bars +=
        '<div class="bar-row">' +
          '<span class="name">' + name + '</span>' +
          '<span class="bar-track"><span class="bar-fill" style="width:' + pct + '%;background:' + color + '"></span></span>' +
          '<span class="amt">' + kb(i.size) + '</span>' +
        '</div>';
      rows +=
        '<tr><th scope="row">' + name + '</th>' +
        '<td class="num">' + intl(i.requestCount) + '</td>' +
        '<td class="num">' + kb(i.size) + '</td></tr>';
    });

    $("weightBody").innerHTML =
      '<div class="stats">' +
        '<div class="stat req"><div class="val">' + intl(data.requests) + '</div><div class="lbl">' + PL.requests + '</div></div>' +
        '<div class="stat size"><div class="val">' + kb(data.bytes) + '</div><div class="lbl">' + PL.transferred + '</div></div>' +
      '</div>' +
      '<h3 class="breakdown-title">' + PL.byType + '</h3>' +
      '<div class="bars" aria-hidden="true">' + bars + '</div>' +
      '<div class="biggest"><strong>' + PL.biggest + ':</strong> ' + top + '</div>' +
      '<table class="data-table">' +
        '<caption>' + PL.tableCaption + '</caption>' +
        '<thead><tr><th scope="col">' + PL.colType + '</th>' +
        '<th scope="col" class="num">' + PL.colReq + '</th>' +
        '<th scope="col" class="num">' + PL.colSize + '</th></tr></thead>' +
        '<tbody>' + rows +
        '<tr><th scope="row">' + PL.total + '</th>' +
        '<td class="num">' + intl(data.requests) + '</td>' +
        '<td class="num">' + kb(data.bytes) + '</td></tr>' +
        '</tbody>' +
      '</table>';
  }

  function showWeightState(html, isError) {
    $("weightBody").innerHTML =
      '<div class="state' + (isError ? ' err' : '') + '">' + html + '</div>';
  }

  async function loadWeight(targetUrl) {
    showWeightState('<div class="spinner" role="status" aria-label="' + PL.loading + '"></div>' + PL.loading, false);
    try {
      const data = await getWeight(targetUrl);
      renderWeight(data);
    } catch (e) {
      const code = e && e.message;
      const msg = code === "PSI_QUOTA" ? PL.errQuota
                : code === "PSI_AUTH"  ? PL.errAuth
                : PL.errPsi;
      showWeightState(msg, true);
    }
  }

  // Hard-coded PSI-style numbers for the owned sample (offline-safe fallback, spec §8)
  const SAMPLE_WEIGHT = {
    requests: 53,
    bytes: 1020688,
    byType: [
      { resourceType: "script",     requestCount: 13, size: 585116 },
      { resourceType: "font",       requestCount: 7,  size: 170608 },
      { resourceType: "image",      requestCount: 18, size: 149111 },
      { resourceType: "stylesheet", requestCount: 3,  size: 68805  },
      { resourceType: "document",   requestCount: 2,  size: 25169  },
      { resourceType: "other",      requestCount: 10, size: 21879  },
    ],
  };

  /* ============================================================
     Panel B — Appearance (proxy fetch + srcdoc) per spec §4
     ============================================================ */
  // fetch with an abort timeout so a slow proxy fails over instead of hanging.
  function fetchT(url, ms) {
    const ctl = new AbortController();
    const t = setTimeout(() => ctl.abort(), ms || 12000);
    return fetch(url, { signal: ctl.signal }).finally(() => clearTimeout(t));
  }

  // Self-hosted Cloudflare Worker proxy (see worker/README.md). Paste your
  // Worker URL here, e.g. "https://anatomia-proxy.NAME.workers.dev".
  // Leave "" to use only the public fallback proxies below.
  const PROXY_WORKER_URL = "https://anatomia-proxy.andrzey-jankowski.workers.dev";
  function proxyWorkerUrl() {
    try { return localStorage.getItem("anatomia.proxyWorker") || PROXY_WORKER_URL; }
    catch (e) { return PROXY_WORKER_URL; }
  }

  // Public CORS proxies, tried in order — gives transient-failure resilience.
  const PROXIES = [
    async u => { const r = await fetchT("https://api.allorigins.win/raw?url=" + encodeURIComponent(u)); if (!r.ok) throw 0; return r.text(); },
    async u => { const r = await fetchT("https://api.allorigins.win/get?url=" + encodeURIComponent(u)); if (!r.ok) throw 0; const j = await r.json(); if (!j || !j.contents) throw 0; return j.contents; },
  ];
  async function fetchViaProxy(u) {
    const chain = PROXIES.slice();
    const wk = proxyWorkerUrl();
    if (wk) {
      // Your Worker is tried FIRST; public proxies remain as fallback.
      chain.unshift(async x => {
        const r = await fetchT(wk.replace(/\/+$/, "") + "/?url=" + encodeURIComponent(x));
        if (!r.ok) throw 0; return r.text();
      });
    }
    let lastErr;
    for (const p of chain) {
      try { const html = await p(u); if (html && html.length > 0) return html; }
      catch (e) { lastErr = e; }
    }
    throw lastErr || new Error("PROXY_FAILED");
  }
  let rawHtmlCache = null;   // cached raw HTML so toggling never re-fetches
  let originUrlCache = null;

  function currentLayers() {
    return {
      css:   $("tCss").checked,
      js:    $("tJs").checked,
      img:   $("tImg").checked,
      fonts: $("tFonts").checked,
    };
  }

  function renderAppearance(rawHtml, originalUrl, layers, iframe) {
    const doc = new DOMParser().parseFromString(rawHtml, "text/html");
    const base = doc.createElement("base");
    base.setAttribute("href", originalUrl);
    doc.head.prepend(base);

    if (!layers.css) doc.querySelectorAll('link[rel="stylesheet"], style').forEach(n => n.remove());
    if (!layers.js)  doc.querySelectorAll('script').forEach(n => n.remove());
    if (!layers.img) doc.querySelectorAll('img, picture, svg[role="img"]').forEach(n => n.remove());
    if (!layers.fonts) {
      // remove web-font <link> (Google Fonts etc.), preload fonts, and @font-face rules
      doc.querySelectorAll('link[rel="preload"][as="font"]').forEach(n => n.remove());
      doc.querySelectorAll('link[rel="stylesheet"]').forEach(n => {
        const href = (n.getAttribute("href") || "").toLowerCase();
        if (href.includes("font") || href.includes("typekit")) n.remove();
      });
      doc.querySelectorAll('style').forEach(s => {
        if (/@font-face/i.test(s.textContent)) s.textContent = s.textContent.replace(/@font-face\s*\{[^}]*\}/gi, "");
      });
    }

    iframe.sandbox = layers.js ? "allow-scripts" : "";
    iframe.srcdoc = "<!doctype html>" + doc.documentElement.outerHTML;

    // SPA-without-JS lesson: detect near-empty body text
    const bodyText = (doc.body && doc.body.textContent || "").replace(/\s+/g, " ").trim();
    const spa = $("spaWarning");
    if (!layers.js && bodyText.length < 40) {
      spa.textContent = PL.noteSpaNoJs;
      spa.hidden = false;
    } else {
      spa.hidden = true;
    }
  }

  function reRender() {
    if (rawHtmlCache == null) return;
    renderAppearance(rawHtmlCache, originUrlCache, currentLayers(), $("preview"));
  }

  function previewMessage(msg) {
    $("preview").srcdoc =
      '<!doctype html><meta charset="utf-8"><body style="margin:0;font-family:system-ui,sans-serif;' +
      'color:#5B554D;display:flex;align-items:center;justify-content:center;height:100vh;' +
      'text-align:center;padding:24px;box-sizing:border-box">' + msg + '</body>';
  }

  async function loadAppearance(targetUrl, sameOrigin) {
    const iframe = $("preview");
    iframe.sandbox = "allow-scripts";
    previewMessage(PL.loadingPreview);
    $("spaWarning").hidden = true;
    try {
      if (sameOrigin) {
        const res = await fetch(targetUrl);
        if (!res.ok) throw new Error("FETCH_FAILED");
        rawHtmlCache = await res.text();
        originUrlCache = new URL(targetUrl, location.href).href;
      } else {
        rawHtmlCache = await fetchViaProxy(targetUrl);
        originUrlCache = targetUrl;
      }
      reRender();
    } catch (e) {
      rawHtmlCache = null;
      previewMessage(PL.errFetch);
    }
  }

  /* ============================================================
     Wiring
     ============================================================ */
  function analyze(targetUrl) {
    loadWeight(targetUrl);
    loadAppearance(targetUrl, false);
  }

  function loadSample() {
    // Same-origin owned sample: hard-coded weight + direct (no-proxy) render
    renderWeight(SAMPLE_WEIGHT);
    $("url").value = "";
    loadAppearance("sample/index.html", true);
  }

  // Accept bare hosts ("gov.pl", "www.wp.pl") — add the protocol in the background.
  function normalizeUrl(raw) {
    let v = (raw || "").trim();
    if (!v) return "";
    if (!/^https?:\/\//i.test(v)) v = "https://" + v.replace(/^\/+/, "");
    return v;
  }

  $("form").addEventListener("submit", function (e) {
    e.preventDefault();
    const v = normalizeUrl($("url").value);
    if (v) analyze(v);
  });
  $("sampleBtn").addEventListener("click", loadSample);
  ["tCss", "tJs", "tImg", "tFonts"].forEach(id =>
    $(id).addEventListener("change", reRender)
  );

  /* ============================================================
     Lekcja — „Jak zbudowana jest strona?" (przykład Rogalik, 3 pliki)
     ============================================================ */
  const ROGALIK_BASE = "sample/rogalik/";
  let rogalikFiles = null;   // { html, css, js }

  function buildStageDoc(stage, files) {
    const doc = new DOMParser().parseFromString(files.html, "text/html");
    // strip the external link/script — we inline CSS/JS per stage so srcdoc is self-contained
    doc.querySelectorAll('link[rel="stylesheet"], script').forEach(n => n.remove());

    if (stage === "text") {
      const raw = (doc.body ? doc.body.textContent : "") || "";
      const text = raw.split("\n").map(l => l.trim()).filter(l => l.length).join("\n");
      const esc = text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
      return '<!doctype html><meta charset="utf-8"><body style="margin:0;padding:18px;' +
        'font-family:ui-monospace,Menlo,monospace;font-size:13px;line-height:1.7;' +
        'white-space:pre-wrap;color:#222;background:#fff">' + esc + '</body>';
    }
    if (stage === "css" || stage === "js") {
      const style = doc.createElement("style"); style.textContent = files.css;
      doc.head.appendChild(style);
    }
    if (stage === "js") {
      const sc = doc.createElement("script"); sc.textContent = files.js;
      doc.body.appendChild(sc);
    }
    return "<!doctype html>" + doc.documentElement.outerHTML;
  }

  function renderStage(stage) {
    if (!rogalikFiles) return;
    const frame = $("lessonFrame");
    frame.sandbox = (stage === "js") ? "allow-scripts" : "";
    frame.srcdoc = buildStageDoc(stage, rogalikFiles);
    const s = PL.lesson.stages.find(x => x.id === stage);
    $("stageName").textContent = s.name;
    $("stageDesc").textContent = s.desc;
    const adds = $("stageAdds");
    adds.innerHTML = "";
    s.adds.forEach(a => { const li = document.createElement("li"); li.textContent = a; adds.appendChild(li); });
    document.querySelectorAll("#stages .stage-btn").forEach(b =>
      b.setAttribute("aria-selected", String(b.dataset.stage === stage)));
  }

  function showFile(fileId) {
    if (!rogalikFiles) return;
    const f = PL.lesson.files.find(x => x.id === fileId);
    const src = fileId === "html" ? rogalikFiles.html : fileId === "css" ? rogalikFiles.css : rogalikFiles.js;
    $("fileRole").textContent = f.role;
    $("fileCode").textContent = src;   // textContent escapes for us
    document.querySelectorAll("#fileTabs .file-tab").forEach(b =>
      b.setAttribute("aria-selected", String(b.dataset.file === fileId)));
  }

  function buildTabs(containerId, items, labelKey, onClick) {
    const el = $(containerId);
    el.innerHTML = "";
    items.forEach(it => {
      const b = document.createElement("button");
      b.type = "button";
      b.className = containerId === "stages" ? "stage-btn" : "file-tab";
      b.dataset[containerId === "stages" ? "stage" : "file"] = it.id;
      b.setAttribute("role", "tab");
      b.setAttribute("aria-selected", "false");
      b.textContent = it[labelKey];
      b.addEventListener("click", () => onClick(it.id));
      el.appendChild(b);
    });
  }

  function fmtFileSize(bytes) {
    if (bytes < 1024) return bytes + " B";
    return (bytes / 1024).toFixed(1).replace(".", ",") + " KB";
  }
  function showFileSizes(html, css, js) {
    const enc = new TextEncoder();
    const h = enc.encode(html).length, c = enc.encode(css).length, j = enc.encode(js).length;
    $("filesSizes").textContent =
      PL.lesson.sizesIntro +
      " index.html " + fmtFileSize(h) +
      " · styles.css " + fmtFileSize(c) +
      " · script.js " + fmtFileSize(j) +
      " · " + PL.lesson.sizesTotal + " " + fmtFileSize(h + c + j);
  }

  async function initLesson() {
    $("lessonTitle").textContent = PL.lesson.title;
    $("lessonSub").textContent = PL.lesson.sub;
    $("filesTitle").textContent = PL.lesson.filesTitle;
    $("filesHint").textContent = PL.lesson.filesHint;
    buildTabs("stages", PL.lesson.stages, "tab", renderStage);
    buildTabs("fileTabs", PL.lesson.files, "name", showFile);

    try {
      const [html, css, js] = await Promise.all([
        fetch(ROGALIK_BASE + "index.html").then(r => r.text()),
        fetch(ROGALIK_BASE + "styles.css").then(r => r.text()),
        fetch(ROGALIK_BASE + "script.js").then(r => r.text()),
      ]);
      rogalikFiles = { html, css, js };
      showFileSizes(html, css, js);
      renderStage("text");
      showFile("html");
    } catch (e) {
      $("lessonFrame").srcdoc =
        '<!doctype html><meta charset="utf-8"><body style="font-family:sans-serif;color:#5B554D;padding:20px">' +
        PL.lesson.err + '</body>';
    }
  }

  // Mode switch — show EITHER the analyzer OR the example, never both.
  function setMode(mode) {
    $("realMode").hidden = (mode !== "real");
    $("exampleMode").hidden = (mode !== "example");
    document.querySelectorAll("#modeSwitch .mode-btn").forEach(b =>
      b.setAttribute("aria-selected", String(b.dataset.mode === mode)));
  }
  $("modeRealBtn").addEventListener("click", () => setMode("real"));
  $("modeExampleBtn").addEventListener("click", () => setMode("example"));

  applyStaticStrings();
  initApiKey();
  initLesson();
  setMode("real");
  </script>
</body>
</html>
