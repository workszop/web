<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Interaktywna symulacja pokazująca, jak przeglądarka przechodzi od adresu URL i odpowiedzi HTTP do DOM, CSSOM, układu i gotowego widoku.">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='9' fill='%23211E1A'/%3E%3Crect x='7' y='7' width='8' height='8' rx='2' fill='%23EF5B3F'/%3E%3Crect x='17' y='7' width='8' height='8' rx='2' fill='%232E78C9'/%3E%3Crect x='7' y='17' width='8' height='8' rx='2' fill='%23E8920C'/%3E%3Crect x='17' y='17' width='8' height='8' rx='2' fill='%237A5AC2'/%3E%3C/svg%3E">
  <title>Jak przeglądarka ładuje stronę WWW — interaktywny przewodnik</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,500;12..96,600;12..96,700;12..96,800&family=Hanken+Grotesk:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap');

    /* ─── edulab design tokens (source: edustyl tokens/colors_and_type.css) ─── */
    :root {
      --font-display: 'Bricolage Grotesque', 'Hanken Grotesk', system-ui, sans-serif;
      --font-sans: 'Hanken Grotesk', system-ui, -apple-system, sans-serif;
      --font-mono: 'DM Mono', ui-monospace, 'SF Mono', Menlo, monospace;

      --paper: #FBF7F0;
      --paper-2: #F4EDDF;
      --paper-3: #ECE1CF;
      --surface: #FFFFFF;
      --ink: #211E1A;
      --ink-2: #5B554D;
      --ink-3: #938A7C;
      --line: #E7DCCB;
      --line-2: #D6C8B2;

      --marigold: #E8920C;
      --marigold-600: #CE800A;
      --marigold-soft: #FBE7C2;
      --marigold-ink: #8A4F00;
      --on-primary: #FFFFFF;
      --teal: #0E8C7F;
      --teal-soft: #D2EBE6;
      --teal-ink: #0A5A52;
      --coral: #EF5B3F;
      --sky: #2E78C9;
      --play-grape: #7A5AC2;
      --success: #2F8F5B;
      --error: #C7463A;
      --error-soft: #F9DDD8;

      --r-xs: 6px; --r-sm: 10px; --r-md: 14px; --r-lg: 20px; --r-xl: 28px; --r-pill: 999px;
      --shadow-sm: 0 1px 2px rgba(33, 30, 26, .06), 0 1px 1px rgba(33, 30, 26, .04);
      --shadow-md: 0 4px 16px rgba(33, 30, 26, .08), 0 1px 3px rgba(33, 30, 26, .05);
      --shadow-lg: 0 16px 40px rgba(33, 30, 26, .12), 0 3px 8px rgba(33, 30, 26, .06);
      --shadow-marigold: 0 8px 22px rgba(232, 146, 12, .28);
      --focus-ring-color: rgba(232, 146, 12, .45);

      /* ─── App mapping: file types on the edulab play palette ─── */
      --html: var(--coral);
      --css: var(--sky);
      --js: var(--marigold);
      --image: var(--play-grape);

      /* ─── Dark data panel (server, code window) — edulab ink family ─── */
      --dark-well: #17140F;
      --dark-card: #2C2820;
      --dark-line: rgba(251, 247, 240, .14);
      --dark-line-strong: rgba(251, 247, 240, .32);
      --dark-muted: #A79D8C;
      --dark-control: #5D554A;
    }

    * { box-sizing: border-box; }

    html { scroll-behavior: smooth; }

    body {
      margin: 0;
      color: var(--ink);
      background:
        radial-gradient(circle at 8% 8%, rgba(232, 146, 12, .10), transparent 24rem),
        radial-gradient(circle at 95% 30%, rgba(14, 140, 127, .08), transparent 26rem),
        var(--paper);
      font-family: var(--font-sans);
      min-height: 100vh;
    }

    button, input { font: inherit; }

    button { -webkit-tap-highlight-color: transparent; }

    :focus-visible {
      outline: 3px solid var(--focus-ring-color);
      outline-offset: 3px;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 20;
      border-bottom: 1px solid var(--line);
      background: rgba(251, 247, 240, .85);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    .topbar-inner,
    .page {
      width: min(1100px, calc(100% - 40px));
      margin: 0 auto;
    }

    .topbar-inner {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      padding: 13px 0;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .edu-logo { width: 32px; height: 32px; display: block; }

    .edu-wordmark {
      color: var(--ink);
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 22px;
      letter-spacing: -.02em;
    }

    .edu-tag {
      padding: 4px 9px;
      border-radius: var(--r-pill);
      color: var(--teal-ink);
      background: var(--teal-soft);
      font: 500 11px/1 var(--font-mono);
      letter-spacing: .14em;
      text-transform: uppercase;
    }

    .topbar-right {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .lab-label {
      color: var(--ink-3);
      font: 500 11px/1 var(--font-mono);
      letter-spacing: .13em;
      text-transform: uppercase;
    }

    .lang-switch {
      display: flex;
      overflow: hidden;
      border: 1px solid var(--line-2);
      border-radius: var(--r-pill);
      background: var(--surface);
    }

    .lang-btn {
      border: 0;
      padding: 6px 11px;
      color: var(--ink-3);
      background: transparent;
      font: 500 11px/1 var(--font-mono);
      letter-spacing: .08em;
      cursor: pointer;
      transition: background .16s ease, color .16s ease;
    }

    .lang-btn[aria-pressed="true"] {
      color: var(--paper);
      background: var(--ink);
    }

    .hero {
      padding: 64px 0 44px;
      text-align: center;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin: 0 0 16px;
      color: var(--marigold-ink);
      font: 500 12px/1 var(--font-mono);
      letter-spacing: .14em;
      text-transform: uppercase;
    }

    .eyebrow::before {
      content: "";
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--marigold);
      box-shadow: 0 0 0 5px rgba(232, 146, 12, .16);
    }

    h1 {
      max-width: 22ch;
      margin: 0 auto;
      color: var(--ink);
      font-family: var(--font-display);
      font-weight: 700;
      font-size: clamp(2.6rem, 6vw, 4.4rem);
      line-height: 1.02;
      letter-spacing: -.025em;
    }

    .hero-copy {
      max-width: 36rem;
      margin: 18px auto 0;
      color: var(--ink-2);
      font-size: clamp(1rem, 1.5vw, 1.125rem);
      line-height: 1.6;
    }

    .hero-note {
      max-width: 38rem;
      margin: 26px auto 0;
      padding: 12px 20px;
      border-radius: var(--r-lg);
      color: var(--teal-ink);
      background: var(--teal-soft);
      font-size: 14px;
      line-height: 1.55;
    }

    .hero-note strong { color: var(--teal-ink); }

    .lab {
      overflow: hidden;
      border: 1px solid var(--line-2);
      border-radius: var(--r-xl);
      background: var(--surface);
      box-shadow: var(--shadow-lg);
    }

    .lab-toolbar {
      min-height: 68px;
      padding: 14px 18px 14px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      border-bottom: 1px solid var(--line);
      background: var(--surface);
    }

    .status {
      min-width: 0;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .status-dot {
      width: 10px;
      height: 10px;
      flex: none;
      border-radius: 50%;
      background: var(--success);
      box-shadow: 0 0 0 5px rgba(47, 143, 91, .12);
      transition: background .2s ease;
    }

    .status.loading .status-dot {
      background: var(--marigold);
      animation: pulse 1s ease infinite;
    }

    .status-copy { min-width: 0; }
    .status-title { display: block; font-weight: 700; font-size: 14px; }
    .status-detail {
      display: block;
      color: var(--ink-2);
      font: 400 11px/1.5 var(--font-mono);
    }

    .request-btn {
      flex: none;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      border: 0;
      border-radius: var(--r-pill);
      padding: 12px 20px;
      color: var(--on-primary);
      background: var(--marigold);
      font-family: var(--font-display);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      box-shadow: var(--shadow-marigold);
      transition: background .16s ease, transform .12s cubic-bezier(.32, .72, .32, 1);
    }

    .request-btn:hover { background: var(--marigold-600); }
    .request-btn:active { transform: scale(.96); }
    .request-btn svg { width: 16px; height: 16px; }

    .request-btn kbd {
      padding: 2px 6px;
      border-radius: 5px;
      background: rgba(255, 255, 255, .22);
      font: 500 10px/1 var(--font-mono);
    }

    .lab-stage {
      min-height: 620px;
      display: grid;
      grid-template-columns: minmax(250px, 300px) minmax(96px, .38fr) minmax(0, 1.6fr);
      align-items: stretch;
    }

    .server-panel,
    .browser-panel { padding: 26px; }

    .server-panel {
      color: var(--paper);
      background: var(--ink);
    }

    .panel-kicker {
      margin: 0 0 5px;
      font: 500 10px/1.4 var(--font-mono);
      letter-spacing: .14em;
      text-transform: uppercase;
    }

    .server-panel .panel-kicker { color: var(--dark-muted); }

    .panel-heading {
      margin: 0;
      font-family: var(--font-display);
      font-weight: 600;
      font-size: 22px;
      line-height: 1.2;
      letter-spacing: -.015em;
    }

    .server-address {
      margin: 10px 0 6px;
      color: var(--dark-muted);
      font: 400 11px/1.5 var(--font-mono);
    }

    .server-hint {
      margin: 0 0 20px;
      color: var(--dark-muted);
      font-size: 11px;
      line-height: 1.5;
    }

    .server-rack {
      padding: 10px;
      border: 1px solid var(--dark-line);
      border-radius: var(--r-md);
      background: var(--dark-well);
      box-shadow: inset 0 0 30px rgba(0, 0, 0, .25);
    }

    .file-toggle {
      --file-color: var(--html);
      min-height: 84px;
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      gap: 12px;
      margin-bottom: 8px;
      padding: 12px;
      border: 1px solid var(--dark-line);
      border-radius: var(--r-sm);
      background: var(--dark-card);
      cursor: pointer;
      transition: opacity .18s ease, border-color .18s ease;
    }

    .file-toggle:last-child { margin-bottom: 0; }
    .file-toggle:hover { border-color: var(--dark-line-strong); }
    .file-toggle[data-file="css"] { --file-color: var(--css); }
    .file-toggle[data-file="js"] { --file-color: var(--js); }
    .file-toggle[data-file="image"] { --file-color: var(--image); }
    .file-toggle.is-off { opacity: .43; }

    .file-toggle input {
      position: absolute;
      inline-size: 1px;
      block-size: 1px;
      opacity: 0;
    }

    .file-toggle:has(input:focus-visible) {
      outline: 3px solid var(--focus-ring-color);
      outline-offset: 3px;
      border-color: var(--marigold);
    }

    .file-icon {
      width: 36px;
      height: 42px;
      display: grid;
      place-items: center;
      position: relative;
      border-radius: 5px 9px 5px 5px;
      color: var(--on-primary);
      background: var(--file-color);
      font: 500 9px/1 var(--font-mono);
      box-shadow: var(--shadow-sm);
    }

    .file-icon::after {
      content: "";
      position: absolute;
      top: 0;
      right: 0;
      border-style: solid;
      border-width: 0 9px 9px 0;
      border-color: transparent rgba(255, 255, 255, .52) transparent transparent;
    }

    .file-meta { min-width: 0; }
    .file-name { display: block; font: 500 12px/1.4 var(--font-mono); }
    .file-role { display: block; color: var(--dark-muted); font-size: 11px; line-height: 1.4; }

    .switch {
      width: 35px;
      height: 20px;
      position: relative;
      border-radius: var(--r-pill);
      background: var(--dark-control);
      transition: background .18s ease;
    }

    .switch::after {
      content: "";
      width: 14px;
      height: 14px;
      position: absolute;
      top: 3px;
      left: 3px;
      border-radius: 50%;
      background: var(--on-primary);
      transition: transform .18s ease;
    }

    input:checked + .file-icon + .file-meta + .switch { background: var(--file-color); }
    input:checked + .file-icon + .file-meta + .switch::after { transform: translateX(15px); }

    .server-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 16px;
    }

    .text-btn {
      border: 1px solid var(--dark-line);
      border-radius: var(--r-pill);
      padding: 8px 11px;
      color: var(--dark-muted);
      background: transparent;
      font-size: 11px;
      cursor: pointer;
      transition: color .16s ease, border-color .16s ease;
    }

    .text-btn:hover { color: var(--paper); border-color: var(--dark-line-strong); }

    .network-panel {
      min-width: 0;
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      padding: 26px 10px;
      background: var(--paper-2);
      border-left: 1px solid var(--line);
      border-right: 1px solid var(--line);
    }

    .network-label {
      position: absolute;
      top: 28px;
      color: var(--ink-3);
      font: 500 9px/1.4 var(--font-mono);
      letter-spacing: .12em;
      text-align: center;
      text-transform: uppercase;
    }

    .request-line {
      position: relative;
      width: 2px;
      height: 72%;
      min-height: 380px;
      background: repeating-linear-gradient(to bottom, var(--line-2) 0 5px, transparent 5px 11px);
    }

    .request-line::before,
    .request-line::after {
      position: absolute;
      left: 50%;
      width: max-content;
      transform: translateX(-50%);
      padding: 5px 8px;
      border: 1px solid var(--line-2);
      border-radius: var(--r-xs);
      color: var(--ink-2);
      background: var(--paper);
      font: 400 9px/1 var(--font-mono);
    }

    .request-line::before { content: attr(data-request); top: 4%; }
    .request-line::after { content: attr(data-response); bottom: 4%; }

    .direction {
      position: absolute;
      left: 50%;
      color: var(--ink-3);
      transform: translateX(-50%);
      font-size: 18px;
    }

    .direction.up { top: -7px; }
    .direction.down { bottom: -7px; }

    .packet {
      --packet-color: var(--html);
      width: 44px;
      height: 25px;
      position: absolute;
      left: 50%;
      top: 8%;
      display: grid;
      place-items: center;
      border: 2px solid var(--paper-2);
      border-radius: 5px;
      color: var(--on-primary);
      background: var(--packet-color);
      box-shadow: var(--shadow-sm);
      font: 500 8px/1 var(--font-mono);
      opacity: 0;
      transform: translate(-50%, -50%);
    }

    .packet[data-file="css"] { --packet-color: var(--css); }
    .packet[data-file="js"] { --packet-color: var(--js); }
    .packet[data-file="image"] { --packet-color: var(--image); }
    .packet.is-error { --packet-color: var(--error); }
    .packet.fly { animation: deliver 1.25s cubic-bezier(.32, .72, .25, 1) forwards; }

    .browser-panel {
      min-width: 0;
      background: var(--paper-3);
    }

    .browser-heading {
      display: flex;
      justify-content: space-between;
      align-items: end;
      gap: 14px;
      margin-bottom: 18px;
    }

    .browser-panel .panel-kicker { color: var(--ink-3); }

    .paint-state {
      color: var(--ink-2);
      font: 400 10px/1.4 var(--font-mono);
      text-align: right;
    }

    .browser {
      overflow: hidden;
      border: 1px solid var(--line-2);
      border-radius: var(--r-md);
      background: var(--surface);
      box-shadow: var(--shadow-md);
    }

    .browser-chrome {
      height: 48px;
      display: grid;
      grid-template-columns: auto minmax(0, 1fr) 20px;
      align-items: center;
      gap: 13px;
      padding: 0 14px;
      border-bottom: 1px solid var(--line);
      background: var(--paper);
    }

    .window-dots { display: flex; gap: 5px; }
    .window-dots span { width: 8px; height: 8px; border-radius: 50%; background: var(--line-2); }
    .window-dots span:first-child { background: var(--coral); }
    .window-dots span:nth-child(2) { background: var(--marigold); }
    .window-dots span:nth-child(3) { background: var(--success); }

    .address-bar {
      min-width: 0;
      padding: 7px 12px;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: var(--r-xs);
      color: var(--ink-3);
      background: var(--surface);
      font: 400 10px/1 var(--font-mono);
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .browser-menu { color: var(--ink-3); font-weight: 800; letter-spacing: 2px; }

    .preview {
      width: 100%;
      height: 480px;
      display: block;
      border: 0;
      background: var(--surface);
    }

    .browser-foot {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      margin-top: 15px;
    }

    .resource-pill {
      --pill-color: var(--html);
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 9px;
      border: 1px solid var(--line-2);
      border-radius: var(--r-pill);
      color: var(--ink-2);
      background: rgba(255, 255, 255, .6);
      font: 400 9px/1 var(--font-mono);
      transition: opacity .18s ease;
    }

    .resource-pill::before {
      content: "";
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--pill-color);
    }

    .resource-pill[data-file="css"] { --pill-color: var(--css); }
    .resource-pill[data-file="js"] { --pill-color: var(--js); }
    .resource-pill[data-file="image"] { --pill-color: var(--image); }
    .resource-pill.is-off { opacity: .3; text-decoration: line-through; }
    .resource-pill.is-error {
      --pill-color: var(--error);
      border-color: rgba(199, 70, 58, .28);
      color: var(--error);
      background: var(--error-soft);
      text-decoration: none;
      opacity: 1;
    }

    .timeline {
      grid-column: 1 / -1;
      padding: 24px;
      border-top: 1px solid var(--line);
      background: var(--paper);
    }

    .timeline-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 20px;
      margin-bottom: 18px;
    }

    .timeline-copy { max-width: 630px; }
    .timeline-copy .panel-kicker { color: var(--marigold-ink); }
    .timeline-title {
      margin: 0;
      font-family: var(--font-display);
      font-size: 19px;
      font-weight: 650;
      letter-spacing: -.01em;
    }

    .timeline-intro {
      margin: 6px 0 0;
      color: var(--ink-2);
      font-size: 12px;
      line-height: 1.55;
    }

    .timeline-controls {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 7px;
    }

    .timeline-btn {
      min-width: 38px;
      min-height: 36px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      border: 1px solid var(--line-2);
      border-radius: var(--r-pill);
      padding: 8px 11px;
      color: var(--ink-2);
      background: var(--surface);
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
    }

    .timeline-btn:hover:not(:disabled) {
      color: var(--ink);
      border-color: var(--marigold);
    }

    .timeline-btn:disabled {
      cursor: default;
      opacity: .4;
    }

    .timeline-btn.primary {
      min-width: 92px;
      color: var(--on-primary);
      border-color: var(--ink);
      background: var(--ink);
    }

    .timeline-progress {
      min-width: 72px;
      color: var(--ink-3);
      font: 500 10px/1 var(--font-mono);
      text-align: center;
    }

    .timeline-list {
      min-height: 70px;
      display: grid;
      gap: 8px;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .timeline-empty {
      display: grid;
      place-items: center;
      min-height: 70px;
      padding: 16px;
      border: 1px dashed var(--line-2);
      border-radius: var(--r-sm);
      color: var(--ink-3);
      font-size: 12px;
      text-align: center;
    }

    .timeline-event {
      width: 100%;
      display: grid;
      grid-template-columns: 72px 12px minmax(0, 1fr);
      gap: 12px;
      align-items: start;
      padding: 11px 13px;
      border: 1px solid var(--line);
      border-radius: var(--r-sm);
      color: inherit;
      background: rgba(255, 255, 255, .65);
      font: inherit;
      text-align: left;
      cursor: pointer;
      transition: border-color .16s ease, background .16s ease, transform .12s ease;
    }

    .timeline-event:hover { border-color: var(--line-2); transform: translateY(-1px); }
    .timeline-event:focus-visible {
      outline: 3px solid var(--focus-ring-color);
      outline-offset: 2px;
    }

    .timeline-event.is-current {
      border-color: rgba(232, 146, 12, .55);
      background: var(--surface);
      box-shadow: var(--shadow-sm);
    }

    .timeline-event.is-selected {
      border-color: var(--teal);
      background: rgba(210, 235, 230, .42);
    }

    .timeline-event.is-error {
      border-color: rgba(199, 70, 58, .25);
      background: rgba(249, 221, 216, .45);
    }

    .timeline-code {
      padding-top: 3px;
      color: var(--ink-3);
      font: 500 9px/1.3 var(--font-mono);
      text-transform: uppercase;
    }

    .timeline-marker {
      width: 9px;
      height: 9px;
      margin-top: 4px;
      border: 2px solid var(--surface);
      border-radius: 50%;
      background: var(--success);
      box-shadow: 0 0 0 1px rgba(47, 143, 91, .35);
    }

    .timeline-event.is-current .timeline-marker {
      background: var(--marigold);
      box-shadow: 0 0 0 3px rgba(232, 146, 12, .14);
    }

    .timeline-event.is-error .timeline-marker {
      background: var(--error);
      box-shadow: 0 0 0 1px rgba(199, 70, 58, .35);
    }

    .timeline-event strong {
      display: block;
      margin-bottom: 3px;
      font-size: 12px;
    }

    .timeline-event p {
      margin: 0;
      color: var(--ink-2);
      font-size: 11px;
      line-height: 1.5;
    }

    .exchange {
      margin-top: 16px;
      overflow: hidden;
      border: 1px solid var(--line-2);
      border-radius: var(--r-md);
      background: var(--surface);
    }

    .exchange[hidden] { display: none; }

    .exchange-head {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 13px 15px;
      border-bottom: 1px solid var(--line);
      background: var(--paper-2);
    }

    .exchange-step {
      flex: none;
      border-radius: var(--r-pill);
      padding: 5px 8px;
      color: var(--marigold-ink);
      background: var(--marigold-soft);
      font: 500 9px/1 var(--font-mono);
      text-transform: uppercase;
    }

    .exchange-title {
      margin: 0;
      font-family: var(--font-display);
      font-size: 14px;
      font-weight: 650;
    }

    .exchange-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .exchange-pane { min-width: 0; }
    .exchange-pane + .exchange-pane { border-left: 1px solid var(--line); }

    .exchange-label {
      display: block;
      padding: 10px 14px;
      border-bottom: 1px solid var(--line);
      color: var(--ink-2);
      background: var(--paper);
      font: 600 9px/1.3 var(--font-mono);
      letter-spacing: .08em;
      text-transform: uppercase;
    }

    .exchange pre {
      height: 330px;
      margin: 0;
      padding: 15px;
      overflow: auto;
      color: var(--paper-3);
      background: var(--ink);
    }

    .exchange code {
      font: 400 10px/1.6 var(--font-mono);
      white-space: pre;
    }

    .explainer {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      border-top: 1px solid var(--line);
      background: var(--surface);
    }

    .explain-step {
      min-height: 150px;
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 14px;
      padding: 25px;
      border-right: 1px solid var(--line);
    }

    .explain-step:last-child { border-right: 0; }

    .step-no {
      width: 31px;
      height: 31px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      color: var(--marigold-ink);
      background: var(--marigold-soft);
      font: 500 11px/1 var(--font-mono);
    }

    .explain-step h3 { margin: 3px 0 7px; font-family: var(--font-display); font-weight: 600; font-size: 15px; }
    .explain-step p { margin: 0; color: var(--ink-2); font-size: 12px; line-height: 1.55; }

    .inspect {
      margin: 32px 0 80px;
      display: grid;
      grid-template-columns: minmax(220px, .6fr) minmax(0, 1.4fr);
      overflow: hidden;
      border: 1px solid var(--line-2);
      border-radius: var(--r-lg);
      background: var(--surface);
      box-shadow: var(--shadow-md);
    }

    .inspect-copy { padding: 28px; }
    .inspect-copy .panel-kicker { color: var(--marigold-ink); }
    .inspect-copy p { color: var(--ink-2); font-size: 13px; line-height: 1.6; }

    .code-tabs { display: flex; flex-wrap: wrap; gap: 7px; margin-top: 20px; }

    .code-tab {
      --tab-color: var(--html);
      border: 1px solid var(--line-2);
      border-radius: var(--r-pill);
      padding: 7px 10px;
      color: var(--ink-2);
      background: transparent;
      font: 500 10px/1 var(--font-mono);
      cursor: pointer;
      transition: background .16s ease, color .16s ease, border-color .16s ease;
    }

    .code-tab[data-file="css"] { --tab-color: var(--css); }
    .code-tab[data-file="js"] { --tab-color: var(--js); }
    .code-tab[data-file="image"] { --tab-color: var(--image); }
    .code-tab[aria-selected="true"] { color: var(--on-primary); background: var(--tab-color); border-color: var(--tab-color); }

    .code-window {
      min-width: 0;
      min-height: 320px;
      padding: 24px 26px;
      overflow: auto;
      color: var(--paper-3);
      background: var(--ink);
    }

    .code-window pre { margin: 0; }
    .code-window code { font: 400 11px/1.75 var(--font-mono); white-space: pre; }

    .sr-only {
      width: 1px;
      height: 1px;
      position: absolute;
      padding: 0;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    @keyframes deliver {
      0% { top: 10%; opacity: 0; transform: translate(-50%, -50%) scale(.7); }
      14% { opacity: 1; }
      85% { opacity: 1; }
      100% { top: 90%; opacity: 0; transform: translate(-50%, -50%) scale(1); }
    }

    @keyframes pulse {
      50% { transform: scale(.78); box-shadow: 0 0 0 9px rgba(232, 146, 12, .08); }
    }

    @media (min-width: 901px) {
      .request-line { transform: rotate(-90deg); }
      .request-line::before,
      .request-line::after,
      .packet { transform: translate(-50%, -50%) rotate(90deg); }
      .packet.fly { animation-name: deliver-horizontal; }
      .direction { transform: translateX(-50%) rotate(90deg); }

      @keyframes deliver-horizontal {
        0% { top: 10%; opacity: 0; transform: translate(-50%, -50%) rotate(90deg) scale(.7); }
        14% { opacity: 1; }
        85% { opacity: 1; }
        100% { top: 90%; opacity: 0; transform: translate(-50%, -50%) rotate(90deg) scale(1); }
      }
    }

    @media (max-width: 1000px) {
      .lab-stage { grid-template-columns: 250px 88px minmax(0, 1fr); }
      .server-panel, .browser-panel { padding: 21px; }
    }

    @media (max-width: 900px) {
      .hero { padding-top: 54px; }
      .lab-stage { grid-template-columns: 1fr; }
      .network-panel { min-height: 230px; padding-top: 56px; border: 0; border-top: 1px solid var(--line); border-bottom: 1px solid var(--line); }
      .request-line { width: 2px; height: 170px; min-height: 0; }
      .network-label { top: 16px; }
      .server-rack { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
      .file-toggle { margin: 0; }
      .preview { height: 510px; }
    }

    @media (max-width: 680px) {
      .topbar-inner, .page { width: min(100% - 24px, 1100px); }
      .lab-label { display: none; }
      .edu-wordmark { font-size: 19px; }
      .hero { padding: 44px 0 30px; }
      h1 { font-size: clamp(2.3rem, 11vw, 3.4rem); }
      .hero-copy { margin-top: 16px; }
      .lab { border-radius: var(--r-lg); }
      .lab-toolbar { align-items: flex-start; padding: 14px; }
      .status-detail { max-width: 220px; }
      .request-btn span, .request-btn kbd { display: none; }
      .request-btn { padding: 12px; }
      .server-panel, .browser-panel { padding: 18px 14px; }
      .server-rack { grid-template-columns: 1fr; }
      .file-toggle { min-height: 72px; }
      .server-panel { order: 1; }
      .network-panel { order: 2; }
      .timeline { order: 3; }
      .browser-panel { order: 4; }
      .browser-heading { align-items: flex-start; }
      .preview { height: 630px; }
      .timeline { padding: 20px 14px; }
      .timeline-head { display: block; }
      .timeline-controls { justify-content: flex-start; margin-top: 16px; }
      .timeline-event { grid-template-columns: 58px 10px minmax(0, 1fr); gap: 9px; padding: 10px; }
      .exchange-grid { grid-template-columns: 1fr; }
      .exchange-pane + .exchange-pane { border-left: 0; border-top: 1px solid var(--line); }
      .exchange pre { height: auto; max-height: 260px; }
      .explainer { grid-template-columns: 1fr; }
      .explain-step { min-height: auto; border-right: 0; border-bottom: 1px solid var(--line); }
      .explain-step:last-child { border-bottom: 0; }
      .inspect { grid-template-columns: 1fr; }
      .code-window { max-height: 350px; min-height: 280px; }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { scroll-behavior: auto !important; animation-duration: .01ms !important; animation-iteration-count: 1 !important; transition-duration: .01ms !important; }
    }
  </style>
</head>

    // ─── Helpers ───
    function selectedFiles() {
      return files.filter(file => inputs[file].checked);
    }

    function sameFiles(first, second) {
      return files.every(file => first.includes(file) === second.includes(file));
    }

    function buildIdle() {
      return `<!doctype html><html><body style="margin:0;min-height:100vh;display:grid;place-items:center;padding:30px;box-sizing:border-box;text-align:center;background:#fff;color:#8b8f8c;font-family:system-ui,sans-serif"><div><div style="width:44px;height:44px;margin:0 auto 14px;border-radius:50%;border:2px dashed #d3d4d0"></div><h2 style="margin:0 0 7px;font-size:16px;color:#4c534f">${t("previewIdleTitle")}</h2><p style="max-width:300px;margin:0;font-size:13px;line-height:1.6">${t("previewIdleBody")}</p></div></body></html>`;
    }

    function buildPreview(delivered) {
      const has = file => delivered.includes(file);
      if (!has("html")) {
        return `<!doctype html><html><body style="margin:0;min-height:100vh;display:grid;place-items:center;padding:30px;box-sizing:border-box;text-align:center;background:#fff;color:#717672;font-family:system-ui,sans-serif"><div><div style="font:700 54px/1 monospace;color:#d9dad7">404</div><h2 style="margin:12px 0 7px;color:#28332f">${t("preview404Title")}</h2><p style="max-width:300px;margin:0;font-size:13px;line-height:1.6">${t("preview404Body")}</p></div></body></html>`;
      }

      const externalScript = '<script src="app.js"><' + '/script>';
      const inlineScript = '<script>\n' + previewJs + '\n<' + '/script>';
      let documentHtml = previewHtml;
      documentHtml = documentHtml.replace(
        '<link rel="stylesheet" href="styles.css">',
        has("css") ? `<style>\n${previewCss}\n    </style>` : ""
      );
      if (has("image")) {
        documentHtml = documentHtml.replace('src="hero.svg"', `src="${imageUri}"`);
      }
      documentHtml = documentHtml.replace(externalScript, has("js") ? inlineScript : "");
      return documentHtml;
    }

    function httpRequestCode(path, accept = "*/*") {
      return `GET ${path} HTTP/2
Host: polana.example
Accept: ${accept}
Accept-Language: pl
Cache-Control: no-cache`;
    }

    function httpResponseCode(available, path, contentType, body) {
      if (!available) {
        return `HTTP/2 404 Not Found
Content-Type: text/plain; charset=utf-8
Cache-Control: no-cache

404 Not Found: ${path}`;
      }
      return `HTTP/2 200 OK
Content-Type: ${contentType}
Cache-Control: max-age=0

${body}`;
    }

    function domTreeCode() {
      return `${t("codeDomComment")}

Document
└─ html[lang="pl"]
   ├─ head
   │  ├─ title
   │  └─ link[href="styles.css"]
   └─ body
      ├─ header.site-header
      │  ├─ a.logo
      │  ├─ nav
      │  └─ button#theme
      ├─ main
      │  ├─ img[src="hero.svg"]
      │  └─ section.content-grid
      │     ├─ div.hero-copy
      │     └─ aside.booking-card
      └─ script[src="app.js"]`;
    }

    function renderPipelineCode(delivered, errors) {
      const cssState = t(delivered.includes("css") ? "codeCssLoaded" : "codeCssMissing");
      const jsState = t(delivered.includes("js") ? "codeJsLoaded" : "codeJsMissing");
      const imageState = t(delivered.includes("image") ? "codeImageLoaded" : "codeImageMissing");
      return `${t("codeRenderComment")}

DOM
 + ${cssState}
 + ${jsState}
 + ${imageState}
        ↓
${t("codeRenderStages")}

200 OK: ${delivered.map(file => fileNames[file]).join(", ")}
404: ${errors.length ? errors.map(file => fileNames[file]).join(", ") : t("timelineNone")}`;
    }

    function createTimelineEvents(available) {
      const documentRequest = httpRequestCode("/", "text/html,application/xhtml+xml");
      const events = [{
        code: "URL",
        title: t("timelineNavigateTitle"),
        detail: t("timelineNavigateDetail"),
        delivered: [],
        responded: [],
        request: "GET /",
        response: "—",
        paintKey: "paintConnecting",
        sentCode: documentRequest,
        receivedCode: t("codeWaiting")
      }];

      const htmlAvailable = available.includes("html");
      events.push({
        code: "HTML",
        title: t(htmlAvailable ? "timelineHtmlOkTitle" : "timelineHtmlErrorTitle"),
        detail: t(htmlAvailable ? "timelineHtmlOkDetail" : "timelineHtmlErrorDetail"),
        delivered: htmlAvailable ? ["html"] : [],
        responded: ["html"],
        request: "GET /",
        response: htmlAvailable ? "200 OK" : "404 Not Found",
        paintKey: htmlAvailable ? "paintHtml" : "paintFailed",
        file: "html",
        error: !htmlAvailable,
        sentCode: documentRequest,
        receivedCode: httpResponseCode(htmlAvailable, "/", "text/html; charset=utf-8", previewHtml)
      });

      if (!htmlAvailable) return events;

      events.push({
        code: "DOM",
        title: t("timelineParseTitle"),
        detail: t("timelineParseDetail"),
        delivered: ["html"],
        responded: ["html"],
        request: "GET /",
        response: "200 OK",
        paintKey: "paintParsing",
        sentCode: t("codeNoNetwork"),
        receivedCode: domTreeCode()
      });

      const linkedRequests = [
        httpRequestCode("/styles.css", "text/css,*/*;q=0.1"),
        httpRequestCode("/app.js", "*/*"),
        httpRequestCode("/hero.svg", "image/svg+xml,image/*,*/*;q=0.8")
      ].join("\n\n──────────\n\n");
      events.push({
        code: "HTTP ×3",
        title: t("timelineRequestsTitle"),
        detail: t("timelineRequestsDetail"),
        delivered: ["html"],
        responded: ["html"],
        request: "GET ×3",
        response: "…",
        paintKey: "paintRequesting",
        sentCode: linkedRequests,
        receivedCode: t("codeResponsesPending")
      });

      const resourceBodies = { css: previewCss, js: previewJs, image: imageSvg };
      const resourceTypes = {
        css: "text/css; charset=utf-8",
        js: "text/javascript; charset=utf-8",
        image: "image/svg+xml"
      };
      const resourceAccepts = {
        css: "text/css,*/*;q=0.1",
        js: "*/*",
        image: "image/svg+xml,image/*,*/*;q=0.8"
      };
      let delivered = ["html"];
      let responded = ["html"];
      linkedFiles.forEach(file => {
        const availableNow = available.includes(file);
        responded = [...responded, file];
        if (availableNow) delivered = [...delivered, file];
        events.push({
          code: file === "image" ? "SVG" : file.toUpperCase(),
          title: fmt(t(availableNow ? "timelineResourceOkTitle" : "timelineResourceErrorTitle"), {
            file: fileNames[file]
          }),
          detail: fmt(t(availableNow ? "timelineResourceOkDetail" : "timelineResourceErrorDetail"), {
            file: fileNames[file],
            kb: fileSizes[file]
          }),
          delivered: [...delivered],
          responded: [...responded],
          request: `GET /${fileNames[file]}`,
          response: availableNow ? "200 OK" : "404 Not Found",
          paintKey: "paintResource",
          file,
          error: !availableNow,
          sentCode: httpRequestCode(`/${fileNames[file]}`, resourceAccepts[file]),
          receivedCode: httpResponseCode(
            availableNow,
            `/${fileNames[file]}`,
            resourceTypes[file],
            resourceBodies[file]
          )
        });
      });

      const loadedNames = delivered.map(file => fileNames[file]).join(", ");
      const errorNames = linkedFiles
        .filter(file => !available.includes(file))
        .map(file => fileNames[file])
        .join(", ") || t("timelineNone");
      const okCount = delivered.length;
      const errorCount = files.length - delivered.length;
      events.push({
        code: "RENDER",
        title: t("timelineRenderTitle"),
        detail: fmt(t("timelineRenderDetail"), { loaded: loadedNames, errors: errorNames }),
        delivered: [...delivered],
        responded: [...files],
        request: "GET ×3",
        response: errorCount ? `${okCount}×200 · ${errorCount}×404` : "4×200 OK",
        paintKey: "paintComplete",
        sentCode: t("codeNoNetwork"),
        receivedCode: renderPipelineCode(
          delivered,
          linkedFiles.filter(file => !available.includes(file))
        )
      });

      return events;
    }

    function renderResourcePills(event) {
      files.forEach(file => {
        const pill = document.querySelector(`.resource-pill[data-file="${file}"]`);
        const responded = event?.responded.includes(file) || false;
        const succeeded = responded && lastRequestedFiles.includes(file);
        const state = !responded ? "Pending" : succeeded ? "Ok" : "Error";
        const key = `pill${file === "image" ? "Image" : file[0].toUpperCase() + file.slice(1)}${state}`;
        pill.dataset.i18n = key;
        pill.textContent = t(key);
        pill.classList.toggle("is-off", !responded);
        pill.classList.toggle("is-error", responded && !succeeded);
      });
    }

    function renderPreviewState(event) {
      const delivered = event?.delivered || [];
      const navigationStarted = Boolean(event);
      const documentResponded = event?.responded.includes("html") || false;
      preview.sandbox = delivered.includes("js") ? "allow-scripts" : "";
      preview.srcdoc = documentResponded ? buildPreview(delivered) : buildIdle();
      addressBar.textContent = navigationStarted ? "https://polana.example" : "about:blank";
    }

    function renderTimelineList() {
      if (timelineIndex < 0) {
        const empty = document.createElement("li");
        empty.className = "timeline-empty";
        empty.textContent = t("timelineEmpty");
        timelineList.replaceChildren(empty);
        return;
      }

      const items = timelineEvents.slice(0, timelineIndex + 1).map((event, index) => {
        const item = document.createElement("li");
        item.className = "timeline-event";
        item.setAttribute("role", "button");
        item.tabIndex = 0;
        item.setAttribute("aria-pressed", String(index === timelineSelectedIndex));
        item.setAttribute("aria-label", event.title);
        item.classList.toggle("is-current", index === timelineIndex);
        item.classList.toggle("is-selected", index === timelineSelectedIndex);
        item.classList.toggle("is-error", Boolean(event.error));
        item.addEventListener("click", () => selectTimelineEvent(index));
        item.addEventListener("keydown", keyEvent => {
          if (keyEvent.key !== "Enter" && keyEvent.key !== " ") return;
          keyEvent.preventDefault();
          selectTimelineEvent(index);
        });

        const code = document.createElement("span");
        code.className = "timeline-code";
        code.textContent = event.code;

        const marker = document.createElement("span");
        marker.className = "timeline-marker";
        marker.setAttribute("aria-hidden", "true");

        const copy = document.createElement("div");
        const title = document.createElement("strong");
        title.textContent = event.title;
        const detail = document.createElement("p");
        detail.textContent = event.detail;
        copy.append(title, detail);
        item.append(code, marker, copy);
        return item;
      });
      timelineList.replaceChildren(...items);
    }

    function renderExchange() {
      const event = timelineSelectedIndex >= 0 && timelineSelectedIndex <= timelineIndex
        ? timelineEvents[timelineSelectedIndex]
        : null;
      timelineExchange.hidden = !event;
      if (!event) return;
      exchangeStep.textContent = event.code;
      exchangeTitle.textContent = event.title;
      exchangeSentCode.textContent = event.sentCode;
      exchangeReceivedCode.textContent = event.receivedCode;
    }

    function selectTimelineEvent(index) {
      if (index < 0 || index > timelineIndex) return;
      pauseTimeline();
      timelineSelectedIndex = index;
      renderTimelineList();
      renderExchange();
    }

    function renderControls() {
      const hasEvents = timelineEvents.length > 0;
      timelinePrev.disabled = !hasEvents || timelineIndex < 0;
      timelineNext.disabled = !hasEvents || timelineIndex >= timelineEvents.length - 1;
      timelinePlay.disabled = !hasEvents;
      timelineReset.disabled = !hasEvents || timelineIndex < 0;
      timelinePlayLabel.textContent = t(isPlaying ? "timelinePause" : "timelinePlay");
      timelinePlayIcon.textContent = isPlaying ? "Ⅱ" : "▶";
      timelinePlay.setAttribute("aria-label", t(isPlaying ? "timelinePause" : "timelinePlay"));
      timelineProgress.textContent = hasEvents
        ? fmt(t("timelineProgress"), {
            current: Math.max(0, timelineIndex + 1),
            total: timelineEvents.length
          })
        : "";
    }

    function renderTimelineState() {
      document.querySelectorAll(".packet").forEach(packet => {
        packet.classList.remove("fly", "is-error");
      });

      const event = timelineIndex >= 0 ? timelineEvents[timelineIndex] : null;
      if (timelineSelectedIndex > timelineIndex) timelineSelectedIndex = timelineIndex;
      renderTimelineList();
      renderExchange();
      renderResourcePills(event);
      renderPreviewState(event);
      renderControls();

      if (!event) {
        statusTitle.textContent = t("statusReady");
        statusDetail.textContent = t("statusReadyDetail");
        paintState.textContent = t("paintIdle");
        requestLine.dataset.request = "GET /";
        requestLine.dataset.response = "—";
        return;
      }

      statusTitle.textContent = event.title;
      statusDetail.textContent = event.detail;
      paintState.textContent = t(event.paintKey);
      requestLine.dataset.request = event.request;
      requestLine.dataset.response = event.response;
    }

    function animateEvent(event) {
      if (!event.file) return;
      const packet = document.querySelector(`.packet[data-file="${event.file}"]`);
      packet.classList.toggle("is-error", Boolean(event.error));
      void packet.offsetWidth;
      packet.classList.add("fly");
    }

    function pauseTimeline() {
      if (timelineTimer) clearInterval(timelineTimer);
      timelineTimer = null;
      isPlaying = false;
      status.classList.remove("loading");
      renderControls();
    }

    function advanceTimeline() {
      if (!timelineEvents.length || timelineIndex >= timelineEvents.length - 1) {
        pauseTimeline();
        return;
      }
      timelineIndex += 1;
      timelineSelectedIndex = timelineIndex;
      renderTimelineState();
      animateEvent(timelineEvents[timelineIndex]);
      if (timelineIndex >= timelineEvents.length - 1) pauseTimeline();
    }

    function playTimeline() {
      if (!timelineEvents.length) return;
      if (isPlaying) {
        pauseTimeline();
        return;
      }
      if (timelineIndex >= timelineEvents.length - 1) {
        timelineIndex = -1;
        timelineSelectedIndex = -1;
        renderTimelineState();
      }
      isPlaying = true;
      status.classList.add("loading");
      renderControls();
      advanceTimeline();
      if (isPlaying) timelineTimer = setInterval(advanceTimeline, 1700);
    }

    function previousTimelineStep() {
      pauseTimeline();
      if (timelineIndex < 0) return;
      timelineIndex -= 1;
      timelineSelectedIndex = timelineIndex;
      renderTimelineState();
    }

    function nextTimelineStep() {
      pauseTimeline();
      advanceTimeline();
    }

    function resetTimeline() {
      pauseTimeline();
      timelineIndex = -1;
      timelineSelectedIndex = -1;
      renderTimelineState();
    }

    function updateRequestButton() {
      requestLabel.textContent = t(hasRequested ? "btnReload" : "btnRequest");
      requestButton.setAttribute("aria-label", t(hasRequested ? "btnReloadAria" : "btnRequestAria"));
    }

    function loadCurrentScenario(animate) {
      pauseTimeline();
      hasRequested = true;
      lastRequestedFiles = selectedFiles();
      timelineEvents = createTimelineEvents(lastRequestedFiles);
      timelineIndex = animate ? -1 : timelineEvents.length - 1;
      timelineSelectedIndex = timelineIndex;
      updateRequestButton();
      renderTimelineState();
      if (animate) playTimeline();
    }

    function sendRequest() {
      if (autoReloadTimer) clearTimeout(autoReloadTimer);
      autoReloadTimer = null;
      loadCurrentScenario(true);
    }

    function reloadAutomatically() {
      autoReloadTimer = null;
      loadCurrentScenario(false);
    }

    function updateServerUI() {
      const pending = selectedFiles();
      files.forEach(file => {
        document.querySelector(`.file-toggle[data-file="${file}"]`).classList.toggle("is-off", !pending.includes(file));
      });

      if (!hasRequested) return;
      if (autoReloadTimer) clearTimeout(autoReloadTimer);
      autoReloadTimer = null;

      if (sameFiles(pending, lastRequestedFiles)) {
        renderTimelineState();
        return;
      }

      pauseTimeline();
      statusTitle.textContent = t("statusChanged");
      statusDetail.textContent = t("statusChangedDetail");
      status.classList.add("loading");
      autoReloadTimer = setTimeout(reloadAutomatically, 120);
    }

    // ─── Language ───
    function applyLang(next) {
      lang = next;
      try { localStorage.setItem(LANG_KEY, lang); } catch (e) { /* ignore */ }
      document.documentElement.lang = lang;
      document.title = t("docTitle");
      document.querySelector('meta[name="description"]').setAttribute("content", t("metaDesc"));
      document.querySelectorAll("[data-i18n]").forEach(el => { el.textContent = t(el.dataset.i18n); });
      document.querySelectorAll("[data-i18n-aria-label]").forEach(el => {
        el.setAttribute("aria-label", t(el.dataset.i18nAriaLabel));
      });
      document.querySelectorAll("[data-i18n-title]").forEach(el => {
        el.setAttribute("title", t(el.dataset.i18nTitle));
      });
      updateRequestButton();
      langButtons.forEach(btn => btn.setAttribute("aria-pressed", String(btn.dataset.lang === lang)));

      if (!hasRequested) {
        timelineEvents = [];
        timelineIndex = -1;
        timelineSelectedIndex = -1;
        renderTimelineState();
      } else {
        pauseTimeline();
        timelineEvents = createTimelineEvents(lastRequestedFiles);
        timelineIndex = Math.min(timelineIndex, timelineEvents.length - 1);
        timelineSelectedIndex = Math.min(timelineSelectedIndex, timelineIndex);
        renderTimelineState();
        if (!sameFiles(selectedFiles(), lastRequestedFiles)) {
          statusTitle.textContent = t("statusChanged");
          statusDetail.textContent = t("statusChangedDetail");
        }
      }
    }

    // ─── Source inspector ───
    const sourceCode = {
      html: previewHtml,
      css: previewCss,
      js: previewJs,
      image: imageSvg
    };

    const codeContent = document.getElementById("codeContent");
    const sourcePanel = document.getElementById("source-panel");
    const codeTabs = [...document.querySelectorAll(".code-tab")];

    function showCode(file) {
      codeContent.textContent = sourceCode[file];
      codeTabs.forEach(tab => {
        const active = tab.dataset.file === file;
        tab.setAttribute("aria-selected", String(active));
        tab.tabIndex = active ? 0 : -1;
        if (active) sourcePanel.setAttribute("aria-labelledby", tab.id);
      });
    }

    // ─── Listeners ───
    document.getElementById("serverRack").addEventListener("change", updateServerUI);
    requestButton.addEventListener("click", sendRequest);
    timelinePrev.addEventListener("click", previousTimelineStep);
    timelinePlay.addEventListener("click", playTimeline);
    timelineNext.addEventListener("click", nextTimelineStep);
    timelineReset.addEventListener("click", resetTimeline);

    function setPreset(active) {
      files.forEach(file => { inputs[file].checked = active.includes(file); });
      updateServerUI();
    }

    document.getElementById("allOn").addEventListener("click", () => setPreset(files));
    document.getElementById("htmlOnly").addEventListener("click", () => setPreset(["html"]));
    document.getElementById("allOff").addEventListener("click", () => setPreset([]));

    langButtons.forEach(btn => btn.addEventListener("click", () => applyLang(btn.dataset.lang)));

    document.addEventListener("keydown", event => {
      if (event.key.toLowerCase() !== "r" || event.metaKey || event.ctrlKey || event.altKey) return;
      if (event.target.matches("input:not([type=checkbox]), textarea") || event.target.isContentEditable) return;
      event.preventDefault();
      sendRequest();
    });

    codeTabs.forEach((tab, index) => {
      tab.addEventListener("click", () => showCode(tab.dataset.file));
      tab.addEventListener("keydown", event => {
        let nextIndex;
        if (event.key === "ArrowRight") nextIndex = (index + 1) % codeTabs.length;
        if (event.key === "ArrowLeft") nextIndex = (index - 1 + codeTabs.length) % codeTabs.length;
        if (event.key === "Home") nextIndex = 0;
        if (event.key === "End") nextIndex = codeTabs.length - 1;
        if (nextIndex === undefined) return;
        event.preventDefault();
        const nextTab = codeTabs[nextIndex];
        showCode(nextTab.dataset.file);
        nextTab.focus();
      });
    });

    // ─── Init ───
    showCode("html");
    applyLang(lang);
  </script>
</body>
</html>
